<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tags — {{siteTitle}}</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <a href="/" class="back-link">← {{siteTitle}}</a>
    <nav class="tabs">{{tabsHtml}}</nav>
  </header>

  <main>
    <div id="active-tag" class="active-tag-banner" style="display:none">
      <span id="active-tag-name"></span>
      <button id="clear-tag" class="clear-tag-btn">Clear</button>
    </div>
    <details class="tag-cloud-section" id="tag-cloud-section" open>
      <summary>Tags</summary>
      <div class="tag-cloud" id="tag-cloud"></div>
    </details>
    <div class="video-count" id="video-count" style="display:none"></div>
    <div class="video-grid" id="video-grid"></div>
  </main>

  <script src="/tags.js"></script>
</body>
</html>
