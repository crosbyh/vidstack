<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{siteTitle}}</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/style.css">
  <link rel="alternate" type="application/rss+xml" title="{{siteTitle}} RSS feed" href="{{feedUrl}}">
</head>
<body>
  <header>
    <div class="header-left">
      <h1><img src="/icon.svg" alt="" class="logo">{{siteTitle}}</h1>
      <nav class="tabs">{{tabsHtml}}</nav>
    </div>
    <nav><a href="/tags.html" class="nav-link">Tags</a><a href="{{feedUrl}}" class="nav-link">RSS</a></nav>
  </header>

  <main>
    <div class="controls">
      <input type="search" id="search" placeholder="Search videos..." autocomplete="off">
      <select id="channel-filter">
        <option value="">All channels</option>
      </select>
      <select id="sort-by">
        <option value="added-desc">Recently added</option>
        <option value="added-asc">Oldest added</option>
        <option value="date-desc">Newest (upload)</option>
        <option value="date-asc">Oldest (upload)</option>
        <option value="duration-desc">Longest first</option>
        <option value="duration-asc">Shortest first</option>
        <option value="title-asc">Title A–Z</option>
        <option value="title-desc">Title Z–A</option>
      </select>
    </div>

    <div class="video-count" id="video-count"></div>
    <div class="video-grid" id="video-grid"></div>
  </main>

  <script>window.VIDSTACK_MANIFEST = "{{manifestUrl}}";</script>
  <script src="/search.js"></script>
</body>
</html>
