server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Disable request body size limit
    client_max_body_size 0;

    # Cache static assets
    location ~* \.(css|js|webp|jpg|png)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Videos - long cache, range requests work by default
    location /videos/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Embed pages - remove X-Frame-Options so iframes work
    location /embed/ {
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "" always;
        try_files $uri $uri.html =404;
    }

    # Watch pages - clean URLs
    location /watch/ {
        try_files $uri $uri.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
