services:
  vidstack:
    build: .
    restart: unless-stopped
    volumes:
      - ${VIDEO_DIR:-./videos}:/data/videos:ro
    environment:
      - VIDEO_DIR=/data/videos
      - BASE_URL=${BASE_URL:-http://localhost}
      - SITE_TITLE=${SITE_TITLE:-My Videos}
    ports:
      - "${PORT:-8080}:80"
